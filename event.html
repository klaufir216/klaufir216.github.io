<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title></title>
  <style>
    * {font-family: Segoe UI, Tahoma, Arial}
    #main {text-align: center; font-size: 1.5em}
    #title {font-size: 140%; padding-bottom: .7em; }
    #imgdiv {padding-bottom: .7em;}
    #local {font-size: 110%; padding-bottom: .2em; }
    #humanized {font-size: 80%; padding-bottom: .7em;}
    #frame {background-color: #efefef;  margin: 0 auto; display: inline-block;
        padding: .5em 1em .5em 1em}
    #utc {font-size: 60% }


    
  </style>
  <script>
    function onLoad() {
      var locale = window.navigator.userLanguage || window.navigator.language;
      moment.locale(locale);
      var imgsrc = new URLSearchParams(document.location.search).get('imgsrc');
      if (imgsrc)
        document.getElementById('img').setAttribute('src',imgsrc)
      else
        document.getElementById('imgdiv').setAttribute('style', 'display: none');
      //
      var utcstring = new URLSearchParams(document.location.search).get('t')
      var title = new URLSearchParams(document.location.search).get('title');
      if (title) {
        document.title = title;
        document.getElementById("title").innerText = title;  
      } else {
        document.getElementById("title").setAttribute('style', 'display: none');
      }
      window.event_time = moment.utc(utcstring);



      document.getElementById("utc").innerText = "UTC: " + event_time.utc().format('YYYY-MM-DD HH:mm:ss'); //moment_utc.format('YYYY-MM-DD HH:mm:ss');
      
      document.getElementById("local").innerText = event_time.local().format('LLLL') + " " + moment.tz(moment.tz.guess()).zoneAbbr();
      
      
      
      setRemainingTimeText();
    }
    
    function setRemainingTimeText() {
        var duration = moment.duration(window.event_time - moment.now(), 'milliseconds');
        var hours = String(duration.hours()).padStart(2,'0');
        var minutes = String(duration.minutes()).padStart(2,'0');
        var seconds = String(duration.seconds()).padStart(2,'0');
        //var milliseconds = String(duration.milliseconds()).padStart(3,'0');
        var hhmmss = hours + ":" + minutes + ":" + seconds;// + "." + milliseconds;
        
        var hoursTotal = duration._milliseconds / 1000 / 60 / 60;
        if (hoursTotal < 24 && duration._milliseconds > 0)
            document.getElementById('humanized').innerText = hhmmss;
        else
            document.getElementById("humanized").innerText = duration.humanize(true);
    }
    
    window.setInterval(setRemainingTimeText, 100);
    
    window.addEventListener('load', onLoad);

  </script>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/moment@2.29.3/min/moment-with-locales.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-timezone@0.5.34/builds/moment-timezone-with-data.js"></script>
<div id="main">
    <div id="frame">
        <div id="title"></div>
        <div id="local"></div>
        <div id="humanized"></div>
        <div id="imgdiv"><img id="img" src=""/ width="200px" height="auto"></div>

    </div>
  <div id="utc"></div>
</div>
  
</body>
</html>
